services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./uploads:/app/../uploads   # Persistent image storage
      - ./data:/app/../data         # Persistent SQLite database
    environment:
      - SECRET_KEY=REPLACE_WITH_A_RANDOM_SECRET_STRING
      - SUPER_ADMIN_USERNAME=admin
      - SUPER_ADMIN_PASSWORD=REPLACE_WITH_SECURE_PASSWORD
      - TZ=Asia/Shanghai

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
